spring.application.name=loginsight-api
server.port=8081

# Java 21 virtual threads replace the Tomcat thread pool — no WebFlux needed
spring.threads.virtual.enabled=true

# Jackson: serialize Instant as ISO-8601 string, not epoch array
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Actuator — expose health + prometheus scrape endpoint via Micrometer
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Don't leak stack traces / framework internals in error responses
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Logging
logging.level.com.loginsight=INFO
logging.level.org.apache.kafka=WARN
logging.level.co.elastic=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Storage backends (empty = disabled, warns at startup)
loginsight.elasticsearch.url=${ELASTICSEARCH_URL:}
loginsight.influxdb.url=${INFLUXDB_URL:}
loginsight.influxdb.token=${INFLUXDB_TOKEN:}
loginsight.influxdb.org=${INFLUXDB_ORG:}
loginsight.influxdb.bucket=${INFLUXDB_BUCKET:}

# Alert subscriber wiring (Kafka source for /api/v1/alerts)
loginsight.kafka.bootstrap-servers=${LOGINSIGHT_KAFKA_BOOTSTRAP_SERVERS:}
loginsight.kafka.alerts-topic=${LOGINSIGHT_KAFKA_ALERTS_TOPIC:anomaly-alerts}
loginsight.kafka.enabled=${LOGINSIGHT_KAFKA_ENABLED:true}
